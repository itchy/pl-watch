openapi: 3.0.3
info:
  title: PL Watch API
  version: 1.0.0
  description: Returns per-team Premier League last-result and next-fixture data.
servers:
  - url: https://{lambda_url}
    variables:
      lambda_url:
        default: pl.itchy7.com
paths:
  /:
    get:
      summary: Get per-team Premier League snapshot
      parameters:
        - name: tz
          in: query
          required: false
          description: IANA timezone name for dow/dom fields (for example America/Los_Angeles).
          schema:
            type: string
            example: America/Los_Angeles
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PremierLeagueSnapshotResponse'
        '400':
          description: Invalid request (for example invalid tz)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server/internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    PremierLeagueSnapshotResponse:
      type: object
      required:
        - general
        - endpoint
        - league
        - teams
        - meta
      properties:
        general:
          type: object
          required:
            - source
            - request_url
            - generated_at
            - timezone
            - using_last_good
            - refresh
          properties:
            source:
              type: string
              example: pl.itchy7.com
            request_url:
              type: string
              example: https://pl.itchy7.com/?tz=America/Los_Angeles
            generated_at:
              type: string
              format: date-time
              example: '2026-03-06T18:22:00Z'
            timezone:
              type: string
              example: America/Los_Angeles
            using_last_good:
              type: boolean
              example: false
            data_last_updated_at:
              type: string
              format: date-time
              example: '2026-03-06T15:30:00Z'
            data_age_seconds:
              type: integer
              example: 42
            fallback_reason:
              type: string
              example: upstream data source timeout
            last_good_age_seconds:
              type: integer
              example: 20
            refresh:
              type: integer
              example: 60
        endpoint:
          type: object
          required:
            - method
            - path
            - supported_query_parameters
          properties:
            method:
              type: string
              example: GET
            path:
              type: string
              example: /
            supported_query_parameters:
              type: object
              additionalProperties:
                type: string
              example:
                tz: IANA timezone name for dow/dom fields (e.g. America/Los_Angeles)
        league:
          type: string
          example: Premier League
        teams:
          type: array
          items:
            type: object
            required:
              - team
              - short_name
            properties:
              team:
                type: string
                example: Arsenal
              short_name:
                type: string
                example: ARS
              last_result:
                type: string
                nullable: true
                enum: [W, L, D]
                example: W
              last_opponent:
                type: string
                nullable: true
                example: Chelsea
              last_match_time_utc:
                type: string
                format: date-time
                nullable: true
                example: '2026-03-01T16:30:00Z'
              next_opponent:
                type: string
                nullable: true
                example: Tottenham
              next_match_time_utc:
                type: string
                format: date-time
                nullable: true
                example: '2026-03-14T15:00:00Z'
              next_match_time_local:
                type: string
                nullable: true
                example: '2026-03-14T08:00:00-0700'
              next_match_dow:
                type: string
                nullable: true
                example: Sat
              next_match_dom:
                type: string
                nullable: true
                example: '14'
              next_match_home_away:
                type: string
                nullable: true
                enum: [H, A]
                example: H
        meta:
          type: object
          required:
            - team_count
            - next_refresh_in_minutes
          properties:
            team_count:
              type: integer
              example: 20
            next_refresh_in_minutes:
              type: integer
              example: 3
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: invalid literal for int() with base 10
